<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널 업로드 모니터링 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f2;--surface:#fff;--surface2:#f0f0ee;
  --text:#111;--text2:#555;--text3:#999;
  --border:#e0e0dc;
  --navy:#1a2340;--navy2:#243058;
  --accent:#e8334a;--accent2:#c41f35;
  --blue:#2563b0;--blue-light:#dbeafe;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* TOPBAR */
.topbar{background:var(--navy);color:#fff;padding:0 28px;display:flex;align-items:center;gap:14px;height:54px;position:sticky;top:0;z-index:200}
.topbar-logo{font-size:15px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.topbar-logo svg{opacity:.9}
.topbar-year{font-size:12px;color:rgba(255,255,255,.5);margin-left:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-fetch{padding:7px 16px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-fetch:hover{background:var(--accent2)}
.btn-fetch:disabled{background:#666;cursor:not-allowed}
.last-update{font-size:11px;color:rgba(255,255,255,.45)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 54px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.main{padding:24px;display:flex;flex-direction:column;gap:24px;overflow:auto}

/* SIDEBAR */
.s-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
input[type=text],input[type=password]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;font-family:inherit;margin-bottom:6px}
input:focus{border-color:var(--blue)}
.hint{font-size:11px;color:var(--text3);line-height:1.6}
.hint a{color:var(--blue);text-decoration:none}
.btn{padding:7px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1d4e98}
.btn-row{display:flex;gap:6px;margin-top:6px}
.ch-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.ch-item{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.ch-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ch-name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-remove{padding:2px 7px;font-size:11px;color:#c41f35;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;font-family:inherit}
.ch-remove:hover{background:#FCEBEB}
.error-box{background:#FCEBEB;color:#A32D2D;border-radius:var(--radius-sm);padding:9px 12px;font-size:12px;display:none;margin-top:8px;line-height:1.5}
.info-bar{background:#EBF3FC;border:1px solid #B5D4F4;border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;color:#185FA5;display:none}

/* YEAR/MONTH SELECTOR */
.year-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.year-row label{font-size:12px;color:var(--text2);font-weight:500}
select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}

/* TABLE SECTION */
.table-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{background:var(--navy);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px}
.table-header h2{font-size:14px;font-weight:700;letter-spacing:-.2px}
.table-header .badge{background:rgba(255,255,255,.15);font-size:11px;padding:2px 9px;border-radius:20px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1e2d50;color:#c8d4ee;padding:9px 14px;font-size:11px;font-weight:600;text-align:center;border:1px solid #2d3f6a;white-space:nowrap}
th:first-child{text-align:left;min-width:110px}
td{padding:9px 14px;border:1px solid var(--border);text-align:center;transition:background .1s}
td:first-child{text-align:left;font-weight:600;background:var(--surface)}
tr:hover td{background:#f8f8f6}
tr:hover td:first-child{background:#f0f0ee}
.td-blue{background:#EBF3FC;color:#1a4e8a;font-weight:600}
.td-total-row td{background:var(--accent);color:#fff;font-weight:700}
.td-total-row td:first-child{background:var(--accent2)}
.td-sum{background:#dbeafe;color:#1e3a6e;font-weight:700}
.td-avg{background:#f0f4ff;color:#2d4a8a;font-weight:600}
.td-highlight{background:#c7e0ff;color:#1a3a7a;font-weight:700}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--text3)}
.empty .icon{font-size:32px;margin-bottom:12px}

/* PROGRESS */
.progress-wrap{margin-top:8px;display:none}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0%}
.progress-text{font-size:11px;color:var(--text3);margin-top:5px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#e8334a"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
    채널 업로드 모니터링
  </div>
  <span class="topbar-year" id="topbarYear"></span>
  <div class="topbar-right">
    <span class="last-update" id="lastUpdate"></span>
    <button class="btn-fetch" id="fetchBtn" onclick="fetchAll()">▶ 데이터 가져오기</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div>
      <div class="s-label">API 키</div>
      <div class="card">
        <input type="password" id="apiKey" placeholder="YouTube Data API v3 키"/>
        <div class="hint">
          <a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console</a>에서 발급<br>
          YouTube Data API v3 활성화 필요
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" style="width:100%" onclick="saveApiKey()">저장</button>
        </div>
      </div>
    </div>

    <div>
      <div class="s-label">조회 기간</div>
      <div class="card">
        <div class="year-row">
          <label>연도</label>
          <select id="selYear"></select>
          <label>시작월</label>
          <select id="selStartMonth"></select>
          <label>~</label>
          <select id="selEndMonth"></select>
        </div>
      </div>
    </div>

    <div>
      <div class="s-label">채널 추가 (최대 8개)</div>
      <div class="card">
        <input type="text" id="chInput" placeholder="@핸들 또는 채널ID" onkeydown="if(event.key==='Enter')addChannel()"/>
        <div class="hint">예: @스튜디오지니 / @채널명 / UCxxxxxx</div>
        <div class="btn-row">
          <button class="btn btn-primary" style="flex:1" onclick="addChannel()">+ 추가</button>
        </div>
        <div id="errorBox" class="error-box"></div>
        <div id="channelList" class="ch-list"></div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="info-bar" id="infoBar">🕐 <span id="infoText"></span></div>

    <div id="emptyState" class="empty">
      <div class="icon">📊</div>
      <p style="font-size:14px;color:#888">API 키를 입력하고 채널을 추가한 뒤<br>데이터 가져오기를 눌러주세요</p>
    </div>

    <div id="mainContent" style="display:none">
      <div class="table-section" id="sec-total">
        <div class="table-header">
          <h2 id="title-total">채널별 월별 '전체' 업로드 영상 수 추이</h2>
          <span class="badge" id="badge-total"></span>
        </div>
        <div class="table-wrap"><table id="tbl-total"><tbody></tbody></table></div>
      </div>

      <div class="table-section" id="sec-long">
        <div class="table-header">
          <h2 id="title-long">채널별 월별 '롱폼' 업로드 영상 수 추이</h2>
          <span class="badge" id="badge-long"></span>
        </div>
        <div class="table-wrap"><table id="tbl-long"><tbody></tbody></table></div>
      </div>

      <div class="table-section" id="sec-short">
        <div class="table-header" style="background:#2d1a40">
          <h2 id="title-short">채널별 월별 '쇼츠' 업로드 영상 수 추이</h2>
          <span class="badge" id="badge-short"></span>
        </div>
        <div class="table-wrap"><table id="tbl-short"><tbody></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS=['#2563b0','#e8334a','#0f6e56','#854f0b','#534ab7','#993355','#3b6d11','#c45c00'];
const MONTH_NAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let state={apiKey:'',channels:[],data:{},year:2026,startMonth:1,endMonth:5};
let isFetching=false;

function save(){try{localStorage.setItem('ytmon_v4',JSON.stringify(state));}catch(e){}}
function load(){try{const d=localStorage.getItem('ytmon_v4');if(d)state=JSON.parse(d);}catch(e){}}
load();

// Init year/month selectors
const yearSel=document.getElementById('selYear');
const startSel=document.getElementById('selStartMonth');
const endSel=document.getElementById('selEndMonth');
for(let y=2023;y<=2027;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'년';if(y===state.year)o.selected=true;yearSel.appendChild(o);}
for(let m=1;m<=12;m++){
  const o1=document.createElement('option');o1.value=m;o1.textContent=m+'월';if(m===state.startMonth)o1.selected=true;startSel.appendChild(o1);
  const o2=document.createElement('option');o2.value=m;o2.textContent=m+'월';if(m===state.endMonth)o2.selected=true;endSel.appendChild(o2);
}
yearSel.onchange=()=>{state.year=parseInt(yearSel.value);save();updateTopbarYear();};
startSel.onchange=()=>{state.startMonth=parseInt(startSel.value);save();};
endSel.onchange=()=>{state.endMonth=parseInt(endSel.value);save();};
function updateTopbarYear(){document.getElementById('topbarYear').textContent=state.year+'년 '+state.startMonth+'~'+state.endMonth+'월';}
updateTopbarYear();

function saveApiKey(){
  const k=document.getElementById('apiKey').value.trim();
  if(!k){showError('API 키를 입력해주세요');return;}
  state.apiKey=k;save();
  document.getElementById('apiKey').value='●'.repeat(24);
  showError('');
  alert('API 키 저장 완료!');
}

function showError(msg){
  const b=document.getElementById('errorBox');
  if(msg){b.textContent=msg;b.style.display='block';}
  else b.style.display='none';
}

async function resolveChannel(input){
  const raw=input.trim();
  if(/^UC[\w-]{22}$/.test(raw)){
    const r=await apiFetch(`channels?part=snippet&id=${raw}`);
    if(r.items&&r.items.length)return{id:r.items[0].id,name:r.items[0].snippet.title};
  }
  const handle=raw.startsWith('@')?raw:'@'+raw;
  const r=await apiFetch(`channels?part=id,snippet&forHandle=${encodeURIComponent(handle)}`);
  if(r.items&&r.items.length)return{id:r.items[0].id,name:r.items[0].snippet.title};
  throw new Error('채널을 찾을 수 없습니다: '+raw);
}

async function apiFetch(path){
  const sep=path.includes('?')?'&':'?';
  const r=await fetch(`https://www.googleapis.com/youtube/v3/${path}${sep}key=${state.apiKey}`);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d;
}

async function addChannel(){
  const inp=document.getElementById('chInput');
  const raw=inp.value.trim();
  if(!raw)return;
  if(!state.apiKey){showError('먼저 API 키를 저장해주세요');return;}
  if(state.channels.length>=8){showError('최대 8개까지 추가 가능합니다');return;}
  showError('');inp.disabled=true;
  try{
    const ch=await resolveChannel(raw);
    if(state.channels.find(c=>c.id===ch.id)){showError('이미 추가된 채널입니다');inp.disabled=false;return;}
    ch.color=COLORS[state.channels.length%COLORS.length];
    state.channels.push(ch);save();inp.value='';
    renderChannelList();
  }catch(e){showError(e.message);}
  inp.disabled=false;
}

function removeChannel(id){
  state.channels=state.channels.filter(c=>c.id!==id);
  delete state.data[id];save();renderChannelList();
  if(state.channels.length>0)renderTables();
  else{document.getElementById('mainContent').style.display='none';document.getElementById('emptyState').style.display='block';}
}

function renderChannelList(){
  const el=document.getElementById('channelList');
  el.innerHTML=state.channels.map(c=>`
    <div class="ch-item">
      <span class="ch-dot" style="background:${c.color}"></span>
      <span class="ch-name">${c.name||c.id}</span>
      <button class="ch-remove" onclick="removeChannel('${c.id}')">✕</button>
    </div>`).join('');
}

// Fetch videos for a channel in a specific year/month
async function fetchMonthVideos(channelId, year, month){
  const start=new Date(year,month-1,1).toISOString();
  const end=new Date(year,month,0,23,59,59).toISOString();
  let total=0,longform=0,shorts=0;
  let pageToken='';
  let videoIds=[];

  // Get all video IDs for the month via search
  do{
    const pt=pageToken?`&pageToken=${pageToken}`:'';
    const res=await apiFetch(`search?part=id&channelId=${channelId}&type=video&publishedAfter=${start}&publishedBefore=${end}&maxResults=50${pt}`);
    if(res.items)videoIds.push(...res.items.map(i=>i.id.videoId));
    pageToken=res.nextPageToken||'';
    total+=res.items?res.items.length:0;
  }while(pageToken);

  // Check duration for each video (batch by 50)
  for(let i=0;i<videoIds.length;i+=50){
    const batch=videoIds.slice(i,i+50).join(',');
    const res=await apiFetch(`videos?part=contentDetails&id=${batch}`);
    if(res.items){
      res.items.forEach(v=>{
        const dur=v.contentDetails.duration;
        const secs=parseDuration(dur);
        if(secs<=60)shorts++;
        else longform++;
      });
    }
  }
  return{total,longform,shorts};
}

function parseDuration(dur){
  const m=dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return 0;
  return (parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}

async function fetchAll(){
  if(isFetching)return;
  if(!state.apiKey){showError('API 키를 입력해주세요');return;}
  if(!state.channels.length){showError('채널을 추가해주세요');return;}
  const yr=parseInt(yearSel.value);
  const sm=parseInt(startSel.value);
  const em=parseInt(endSel.value);
  if(sm>em){showError('시작월이 종료월보다 클 수 없습니다');return;}
  state.year=yr;state.startMonth=sm;state.endMonth=em;save();updateTopbarYear();

  isFetching=true;showError('');
  document.getElementById('fetchBtn').disabled=true;
  document.getElementById('fetchBtn').textContent='⏳ 가져오는 중...';
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('emptyState').style.display='none';

  const months=[];
  for(let m=sm;m<=em;m++)months.push(m);
  const total=state.channels.length*months.length;
  let done=0;

  try{
    for(const ch of state.channels){
      if(!state.data[ch.id])state.data[ch.id]={};
      for(const m of months){
        const key=`${yr}-${m}`;
        document.getElementById('progressText').textContent=`${ch.name||ch.id} ${m}월 처리 중... (${done+1}/${total})`;
        document.getElementById('progressFill').style.width=((done/total)*100)+'%';
        try{
          const res=await fetchMonthVideos(ch.id,yr,m);
          state.data[ch.id][key]=res;
        }catch(e){
          state.data[ch.id][key]={total:0,longform:0,shorts:0,error:true};
        }
        done++;save();
      }
    }
    document.getElementById('progressFill').style.width='100%';
    document.getElementById('progressText').textContent='완료!';
    setTimeout(()=>{document.getElementById('progressWrap').style.display='none';},1500);

    document.getElementById('mainContent').style.display='block';
    const ib=document.getElementById('infoBar');
    ib.style.display='flex';
    document.getElementById('infoText').textContent='마지막 업데이트: '+new Date().toLocaleString('ko-KR');
    document.getElementById('lastUpdate').textContent=new Date().toLocaleString('ko-KR');
    renderTables();
  }catch(e){
    showError('오류: '+e.message);
    document.getElementById('progressWrap').style.display='none';
  }
  isFetching=false;
  document.getElementById('fetchBtn').disabled=false;
  document.getElementById('fetchBtn').textContent='▶ 데이터 가져오기';
}

function renderTables(){
  const yr=state.year,sm=state.startMonth,em=state.endMonth;
  const months=[];
  for(let m=sm;m<=em;m++)months.push(m);
  const yearStr=`(${yr}년 ${sm}~${em}월)`;

  document.getElementById('title-total').textContent=`채널별 월별 '전체' 업로드 영상 수 추이 ${yearStr}`;
  document.getElementById('title-long').textContent=`채널별 월별 '롱폼' 업로드 영상 수 추이 ${yearStr}`;
  document.getElementById('title-short').textContent=`채널별 월별 '쇼츠' 업로드 영상 수 추이 ${yearStr}`;

  buildTable('tbl-total','total',months,yr,'badge-total');
  buildTable('tbl-long','longform',months,yr,'badge-long');
  buildTable('tbl-short','shorts',months,yr,'badge-short');
}

function buildTable(tableId,field,months,yr,badgeId){
  const tbl=document.getElementById(tableId);
  const badge=document.getElementById(badgeId);

  // Find max per month for highlight
  const maxPerMonth={};
  months.forEach(m=>{
    let mx=0;
    state.channels.forEach(ch=>{
      const key=`${yr}-${m}`;
      const v=(state.data[ch.id]&&state.data[ch.id][key])?state.data[ch.id][key][field]||0:0;
      if(v>mx)mx=v;
    });
    maxPerMonth[m]=mx;
  });

  let html='<thead><tr>';
  html+=`<th style="text-align:left">채널명</th>`;
  months.forEach(m=>html+=`<th>${m}월</th>`);
  html+=`<th style="background:#c7e0ff;color:#1a3a7a">합계</th><th style="background:#e8f0fe;color:#2d4a8a">월평균</th>`;
  html+='</tr></thead><tbody>';

  let monthTotals={};months.forEach(m=>monthTotals[m]=0);
  let grandTotal=0;

  state.channels.forEach(ch=>{
    html+=`<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ch.color};margin-right:6px"></span>${ch.name||ch.id}</td>`;
    let rowSum=0;
    months.forEach(m=>{
      const key=`${yr}-${m}`;
      const v=(state.data[ch.id]&&state.data[ch.id][key])?state.data[ch.id][key][field]||0:'-';
      const num=typeof v==='number'?v:0;
      rowSum+=num;
      monthTotals[m]+=num;
      const isMax=(num===maxPerMonth[m]&&num>0);
      html+=`<td class="${isMax?'td-blue':''}">${v}</td>`;
    });
    grandTotal+=rowSum;
    const avg=(rowSum/months.length).toFixed(1);
    html+=`<td class="td-sum">${rowSum}</td><td class="td-avg">${avg}</td>`;
    html+='</tr>';
  });

  // Total row
  html+=`<tr class="td-total-row"><td>전체 합계</td>`;
  let totalSum=0;
  months.forEach(m=>{html+=`<td>${monthTotals[m]}</td>`;totalSum+=monthTotals[m];});
  html+=`<td>${totalSum}</td><td></td></tr>`;
  html+='</tbody>';
  tbl.innerHTML=html;

  badge.textContent=`합계 ${totalSum}개`;
}

// Init
renderChannelList();
if(state.apiKey)document.getElementById('apiKey').value='●'.repeat(24);
if(state.channels.length&&Object.keys(state.data).length){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('mainContent').style.display='block';
  document.getElementById('infoBar').style.display='flex';
  document.getElementById('infoText').textContent='저장된 데이터 표시 중 — 새로 가져오려면 버튼을 누르세요';
  renderTables();
}
</script>
